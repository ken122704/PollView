config:
  target: "https://pollview-backend.onrender.com"
  
  phases:
    # Phase 1: The Warm-Up (Establish connections gently)
    - duration: 10
      arrivalRate: 10
      name: "Warm up phase"
      
    # Phase 2: The Sustained Load (Test the Mutex in production)
    - duration: 30
      arrivalRate: 30
      name: "Sustained load"

  engines:
    socketio: {}

scenarios:
  - engine: "socketio"
    flow:
      # Replace 'YOUR_LIVE_POLL_ID' with the ID of the poll you just created
      - emit:
          channel: "join_poll"
          data: "RDNHKG"
      - think: 1 
      - emit:
          channel: "cast_vote"
          data:
            pollId: "RDNHKG" # Replace 'YOUR_LIVE_POLL_ID' with the ID of the poll you just created
            optionId: "opt_1" 